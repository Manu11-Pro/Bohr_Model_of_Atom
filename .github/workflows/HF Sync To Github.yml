name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_SYNC_TO_GITHUB }}
        run: |
          git push --force https://manu11pro:$HF_TOKEN@huggingface.co/spaces/manu11pro/bohr-model-of-atom main
